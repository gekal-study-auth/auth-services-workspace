server:
  port: 9000

spring:
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/auth_services}
    username: ${AUTH_DB_USERNAME:auth_user}
    password: ${AUTH_DB_PASSWORD:auth_password}
  flyway:
    locations: classpath:db/migration

logging:
  level:
    org.springframework.security: INFO
