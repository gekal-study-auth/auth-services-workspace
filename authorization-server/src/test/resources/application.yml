spring:
  datasource:
    url: jdbc:h2:mem:auth;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS authorization_server\;SET SCHEMA authorization_server
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    locations: classpath:db/migration
    schemas: authorization_server
    default-schema: authorization_server
    create-schemas: true
