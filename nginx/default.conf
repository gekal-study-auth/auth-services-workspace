map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $uri $api_access_loggable {
    default 0;
    ~^/api/ 1;
    ~^/ui-api/ 1;
    ~^/oauth2/ 1;
    ~^/connect/ 1;
    ~^/\.well-known/ 1;
    ~^/actuator/(?!health$) 1;
}

# Logstash-shaped JSON so Dozzle parses these the same way as the Spring Boot services.
# escape=json keeps user-controlled values (URI, user agent) from breaking the document.
log_format api_access escape=json
    '{'
    '"@timestamp":"$time_iso8601",'
    '"@version":"1",'
    '"message":"$request_method $uri $status",'
    '"logger_name":"nginx.access",'
    '"thread_name":"$pid",'
    '"level":"INFO",'
    '"level_value":20000,'
    '"service":"nginx",'
    '"server_name":"$server_name",'
    '"remote_addr":"$remote_addr",'
    '"remote_user":"$remote_user",'
    '"request_method":"$request_method",'
    '"uri":"$uri",'
    '"server_protocol":"$server_protocol",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"request_id":"$request_id",'
    '"request_time":$request_time,'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_status":"$upstream_status",'
    '"upstream_response_time":"$upstream_response_time"'
    '}';

# nginx cannot format error_log as JSON, so it stays plain text.
error_log /dev/stderr warn;

server {
    listen 443 ssl;
    server_name authorization-server.local.gekal.cn;

    ssl_certificate /etc/nginx/certs/local.gekal.cn/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/local.gekal.cn/privkey.pem;
    access_log /dev/stdout api_access if=$api_access_loggable;

    location = /login {
        root /usr/share/nginx/html/authorization-ui;
        try_files /login.html =404;
    }

    location = /oauth2/consent {
        root /usr/share/nginx/html/authorization-ui;
        try_files /oauth2/consent.html =404;
    }

    location = /logout/complete {
        root /usr/share/nginx/html/authorization-ui;
        try_files /logout/complete.html =404;
    }

    location = /error {
        root /usr/share/nginx/html/authorization-ui;
        try_files /error.html =404;
    }

    location ^~ /_next/ {
        alias /usr/share/nginx/html/authorization-ui/_next/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://authorization-server:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 443 ssl;
    server_name resource-server.local.gekal.cn;

    ssl_certificate /etc/nginx/certs/local.gekal.cn/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/local.gekal.cn/privkey.pem;
    access_log /dev/stdout api_access if=$api_access_loggable;

    location / {
        proxy_pass http://resource-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Request-ID $request_id;
    }
}

server {
    listen 443 ssl;
    server_name dashboard.local.gekal.cn;

    ssl_certificate /etc/nginx/certs/local.gekal.cn/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/local.gekal.cn/privkey.pem;
    access_log /dev/stdout api_access if=$api_access_loggable;

    location / {
        proxy_pass http://dozzle:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # Dozzle streams container logs over SSE/WebSocket, so buffering must stay off and
        # the read timeout long enough to hold an idle stream open.
        proxy_buffering off;
        proxy_read_timeout 1d;
    }
}

server {
    listen 443 ssl;
    server_name client-app.local.gekal.cn;

    ssl_certificate /etc/nginx/certs/local.gekal.cn/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/local.gekal.cn/privkey.pem;
    access_log /dev/stdout api_access if=$api_access_loggable;

    location / {
        proxy_pass http://client-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
