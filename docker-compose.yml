services:
  postgres:
    image: postgres:17-alpine
    container_name: auth-services-postgres
    environment:
      POSTGRES_DB: auth_services
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_services"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  authorization-server:
    build:
      context: .
      dockerfile: authorization-server/Dockerfile
    image: auth-services/authorization-server:local
    container_name: auth-services-authorization-server
    environment:
      AUTH_DB_URL: jdbc:postgresql://postgres:5432/auth_services
      AUTH_DB_USERNAME: auth_user
      AUTH_DB_PASSWORD: auth_password
    ports:
      - "${AUTHORIZATION_SERVER_PORT:-9000}:9000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:9000/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  resource-server:
    build:
      context: .
      dockerfile: resource-server/Dockerfile
    image: auth-services/resource-server:local
    container_name: auth-services-resource-server
    environment:
      AUTHORIZATION_SERVER_ISSUER: http://localhost:9000
      AUTHORIZATION_SERVER_JWK_SET_URI: http://authorization-server:9000/oauth2/jwks
    ports:
      - "${RESOURCE_SERVER_PORT:-8080}:8080"
    depends_on:
      authorization-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  client-app:
    build:
      context: .
      dockerfile: client-app/Dockerfile
    image: auth-services/client-app:local
    container_name: auth-services-client-app
    environment:
      AUTHORIZATION_SERVER_URL: http://localhost:9000
      AUTHORIZATION_SERVER_INTERNAL_URL: http://authorization-server:9000
      RESOURCE_SERVER_URL: http://resource-server:8080
      OAUTH_CLIENT_ID: nextjs-client
      OAUTH_REDIRECT_URI: http://localhost:3000/api/auth/callback
      SESSION_SECRET: local-compose-only-6c1837e2bfa44a8596f5d17998a735ad
    ports:
      - "${CLIENT_APP_PORT:-3000}:3000"
    depends_on:
      authorization-server:
        condition: service_healthy
      resource-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  auth-postgres-data:
