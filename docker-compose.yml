x-db-config: &db-config
  POSTGRES_DB: &db-name auth_services
  POSTGRES_USER: &db-user auth_user
  POSTGRES_PASSWORD: &db-password auth_password

services:
  postgres:
    image: auth-services/postgres:18.4-bookworm
    build:
      context: .
      dockerfile: database/Dockerfile
    container_name: auth-services-postgres
    environment:
      <<: *db-config
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - auth-postgres18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_services"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  authorization-server:
    build:
      context: .
      dockerfile: authorization-server/Dockerfile
    image: auth-services/authorization-server:local
    container_name: auth-services-authorization-server
    environment:
      AUTH_DB_URL: &db-url jdbc:postgresql://postgres:5432/auth_services
      AUTH_DB_USERNAME: *db-user
      AUTH_DB_PASSWORD: *db-password
      AUTH_ISSUER: https://authorization-server.local.gekal.cn
      SERVER_FORWARD_HEADERS_STRATEGY: framework
    ports:
      - "${AUTHORIZATION_SERVER_PORT:-9000}:9000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:9000/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    init: true

  resource-server:
    build:
      context: .
      dockerfile: resource-server/Dockerfile
    image: auth-services/resource-server:local
    container_name: auth-services-resource-server
    environment:
      AUTHORIZATION_SERVER_ISSUER: https://authorization-server.local.gekal.cn
      AUTHORIZATION_SERVER_JWK_SET_URI: http://authorization-server:9000/oauth2/jwks
      SERVER_FORWARD_HEADERS_STRATEGY: framework
    ports:
      - "${RESOURCE_SERVER_PORT:-8080}:8080"
    depends_on:
      authorization-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    init: true

  client-app:
    build:
      context: .
      dockerfile: client-app/Dockerfile
    image: auth-services/client-app:local
    container_name: auth-services-client-app
    environment:
      AUTHORIZATION_SERVER_URL: https://authorization-server.local.gekal.cn
      AUTHORIZATION_SERVER_INTERNAL_URL: http://authorization-server:9000
      RESOURCE_SERVER_URL: http://resource-server:8080
      OAUTH_CLIENT_ID: nextjs-client
      OAUTH_REDIRECT_URI: https://client-app.local.gekal.cn/api/auth/callback
      SESSION_SECRET: local-compose-only-6c1837e2bfa44a8596f5d17998a735ad
    ports:
      - "${CLIENT_APP_PORT:-3000}:3000"
    depends_on:
      authorization-server:
        condition: service_healthy
      resource-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: auth-services/nginx:local
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: auth-services-nginx
    ports:
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      authorization-server:
        condition: service_healthy
      resource-server:
        condition: service_healthy
      client-app:
        condition: service_healthy
    restart: unless-stopped
    init: true

volumes:
  auth-postgres18-data:
